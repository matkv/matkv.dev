{{ define "main" }}
<main class="full-width">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    <table class="book-table">
        <thead>
            <tr>
                <th>Book</th>
                <th>Author</th>
                <th>Rating</th>
            </tr>
        </thead>
        <tbody>
            {{ range .Pages }}
            {{ $title := .Title }}
            <tr>
                <td>
                    {{ with .Content }}
                    <details>
                        <summary>{{ $title }}</summary>
                        {{ . | markdownify }}
                    </details>
                    {{ else }}
                    {{ $title }}
                    {{ end }}
                </td>
                <td>{{ delimit .Params.author ", " }}</td>
                <td>{{ with .Params.rating }}{{ . }}{{ end }}</td>
            </tr>
            {{ end }}
        </tbody>
    </table>
</main>
{{ end }}
